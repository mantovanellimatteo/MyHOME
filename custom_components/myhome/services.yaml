sync_time:
  name: Syncronize time
  description: Syncronize gateway's time to HA local time.
  fields:
    gateway:
      name: Gateway
      description: The gateway's MAC address, as present in the config.
      example: 00:03:50:00:00:00

send_message:
  name: Send message
  description: Send an arbitrary (but valid) OpenWebNet message to the gateway.
  fields:
    gateway:
      name: Gateway
      description: The gateway's MAC address, as present in the config.
      example: 00:03:50:00:00:00
    message:
      name: Message
      description: Valid OpenWebNet message.
      example: "*1*0*0##"

start_sending_instant_power:
  name: Start sending instant power
  description: Get automatic instant power draw updates for a sensor.
  fields:
    entity_id:
      name: Entity
      description: Name(s) of entities that will start sending instant power information.
      example: "sensor.general_power"
    duration:
      name: Duration
      description: For how long the instant power information will be sent.
      example: "60"

scan_bus:
  name: Scan bus
  description: Performs an active scan of all standard addresses on the SCS bus for lights, covers, and heating zones, writing the results to a YAML file.
  fields:
    gateway:
      name: Gateway
      description: The gateway's MAC address (optional).
      example: "00:03:50:00:00:00"
    output_file:
      name: Output file
      description: File name to save discovered devices in config directory (optional, default myhome_discovered.yaml).
      example: "myhome_discovered.yaml"

export_to_yaml:
  name: Export to YAML
  description: Exports all currently UI-configured devices (from options flow) to a YAML configuration file.
  fields:
    gateway:
      name: Gateway
      description: The gateway's MAC address (optional).
      example: "00:03:50:00:00:00"
    output_file:
      name: Output file
      description: File name to save exported configuration in config directory (optional, default myhome_exported.yaml).
      example: "myhome_exported.yaml"
